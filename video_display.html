<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Display</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video-player {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Preserve aspect ratio */
        }

        .loading-overlay {
            position: absolute;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 1.5rem;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">Loading latest video...</div>
    <video id="video-player" autoplay playsinline></video>

    <script type="module">
        import { getVideos } from './supabase.js';

        document.addEventListener('DOMContentLoaded', async () => {
            const videoPlayer = document.getElementById('video-player');
            const loading = document.getElementById('loading');

            const continueCycle = () => {
                const nextSlide = localStorage.getItem('next_schedule_slide') || 'display_lhr_kc.html';
                window.location.href = nextSlide;
            };

            // Fetch playlist
            try {
                const result = await getVideos();
                if (result.success && result.data && result.data.length > 0) {
                    const playlist = result.data;
                    let currentIndex = parseInt(localStorage.getItem('current_video_index') || '0', 10);
                    
                    if (currentIndex >= playlist.length || isNaN(currentIndex)) {
                        currentIndex = 0;
                    }

                    const videoToPlay = playlist[currentIndex];
                    videoPlayer.src = videoToPlay.public_url;
                    videoPlayer.style.display = 'block';
                    loading.style.display = 'none';
                    
                    // Increment and save index for next time
                    localStorage.setItem('current_video_index', (currentIndex + 1).toString());

                    // Configure player to return to standard cycle when video finishes
                    videoPlayer.onended = continueCycle;
                    
                    // Force play
                    videoPlayer.play().catch(e => {
                        console.warn('Autoplay prevented:', e);
                        loading.textContent = 'Autoplay prevented. Redirecting...';
                        loading.style.display = 'block';
                        setTimeout(continueCycle, 3000);
                    });

                    // Safeguard: if video is very long or gets stuck, max 35 seconds
                    setTimeout(continueCycle, 35000);

                } else {
                    console.warn('No videos in playlist.');
                    loading.textContent = 'No videos available. Returning to cycle...';
                    setTimeout(continueCycle, 3000);
                }
            } catch (error) {
                console.error('Error in video display:', error);
                loading.textContent = 'Error loading video. Returning to cycle...';
                setTimeout(continueCycle, 3000);
            }
        });
    </script>
</body>
</html>
